services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DEBUG=0
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
      - SECURE_SSL_REDIRECT=1
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_quests &&
             gunicorn exilequest.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 30"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  sqlite_data:
