services:
  web:
    image: alex938/poetrack:1.0
    env_file:
      - .env
    restart: unless-stopped
    environment:
      #- SECRET_KEY=${SECRET_KEY}
      #- ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,exilequest.app}
      #- CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://exilequest.app}
      - SECURE_SSL_REDIRECT=0
      #- LOG_LEVEL=WARNING
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN2}
    networks:
      - internal

networks:
  internal:
